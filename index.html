<!DOCTYPE html>
<html lang="en">
    <head>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
<body class="w-full">
<div class="contact-section flex flex-col justify-center items-center bg-[#fcfcff] h-180 rounded-2xl w-[1500px] m-auto">
    <h1 class="mt-10 text-[40px] font-bold">Get in Touch</h1>
    <div class="mt-8 flex flex-col gap-5">
        <div class="flex flex-col gap-1">
        <label>Name</label>
        <input class="border border-[#ceced2] rounded-md p-1 w-120" type="text" placeholder="John Doe"/>
        </div>
        <div class="flex flex-col gap-1">
        <label>Email</label>
        <input class="border border-[#ceced2] rounded-md p-1 w-120" type="email" placeholder="john@example.com"/>
    </div>
    <div class="flex flex-col gap-1">
        <label>Message</label>
        <textarea class="border border-[#ceced2] rounded-md p-2 w-full h-32 resize-none" placeholder="Your message..."></textarea>
    </div>
    </div>
    <button class="bg-black w-120 rounded-md text-white m-6 h-10">Submit</button>
</div>
<footer class="flex flex-row justify-between items-center pt-10 p-55">
    <h3>
        Acme productivity app ©2024 
    </h3>
    <ul class="flex flex-row justify-between items-center gap-5 font-bold">
        <li>FAQ</li> <li>Terms</li> <li>AI Policy</li> <li>Pricing</li>
    </ul>
</footer>
</body>
</html>
